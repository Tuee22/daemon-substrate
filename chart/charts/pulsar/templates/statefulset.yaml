apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Release.Name }}-pulsar
spec:
  serviceName: {{ .Release.Name }}-pulsar
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: pulsar
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pulsar
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-pulsar-data
      initContainers:
        - name: data-permissions
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          command:
            - /bin/sh
            - -c
          args:
            - |
              mkdir -p /pulsar/data
              chown -R 10000:0 /pulsar/data
              chmod -R g+rwX /pulsar/data
          securityContext:
            runAsUser: 0
            runAsGroup: 0
          volumeMounts:
            - name: data
              mountPath: /pulsar/data
      containers:
        - name: pulsar
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          securityContext:
            runAsUser: 10000
            runAsGroup: 0
          command:
            - /bin/sh
            - -c
          args:
            - |
              bin/apply-config-from-env.py conf/standalone.conf
              exec bin/pulsar standalone \
                --advertised-address {{ .Release.Name }}-pulsar \
                --bookkeeper-port {{ .Values.bookkeeper.port }} \
                --no-functions-worker \
                --no-stream-storage
          env:
            - name: PULSAR_PREFIX_advertisedAddress
              value: {{ .Release.Name }}-pulsar
            - name: PULSAR_PREFIX_allowEphemeralPorts
              value: "true"
            - name: PULSAR_PREFIX_bookiePort
              value: "{{ .Values.bookkeeper.port }}"
          ports:
            - name: pulsar
              containerPort: 6650
            - name: admin
              containerPort: 8080
            - name: bookkeeper
              containerPort: {{ .Values.bookkeeper.port }}
          volumeMounts:
            - name: data
              mountPath: /pulsar/data
          startupProbe:
            httpGet:
              path: /admin/v2/clusters
              port: admin
            periodSeconds: 2
            failureThreshold: 60
          readinessProbe:
            httpGet:
              path: /admin/v2/clusters
              port: admin
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 6
