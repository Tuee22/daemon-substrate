{{- if .Values.worker.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "daemon-substrate-test.fullname" . }}-worker
  labels:
    {{- include "daemon-substrate-test.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  replicas: {{ .Values.worker.replicas }}
  selector:
    matchLabels:
      {{- include "daemon-substrate-test.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        {{- include "daemon-substrate-test.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: worker
    spec:
      {{- if .Values.worker.antiAffinity.required }}
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  {{- include "daemon-substrate-test.selectorLabels" . | nindent 18 }}
                  app.kubernetes.io/component: worker
              topologyKey: {{ .Values.worker.antiAffinity.topologyKey | quote }}
      {{- end }}
      containers:
        - name: daemon-substrate-test
          image: {{ include "daemon-substrate-test.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - daemon-substrate-test
          args:
            - service
            - --role
            - worker
            - --config
            - /etc/daemon-substrate/worker.dhall
            - --live-config
            - /etc/daemon-substrate/live.dhall
            - --lifecycle-policy
            - /etc/daemon-substrate/lifecycle-policy.dhall
          ports:
            - name: http
              containerPort: {{ .Values.worker.service.port }}
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}
          volumeMounts:
            - name: worker-config
              mountPath: /etc/daemon-substrate
              readOnly: true
      volumes:
        - name: worker-config
          configMap:
            name: {{ include "daemon-substrate-test.workerConfigName" . }}
{{- end }}
