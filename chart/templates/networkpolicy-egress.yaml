{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "daemon-substrate-test.fullname" . }}-restricted-egress
  labels:
    {{- include "daemon-substrate-test.labels" . | nindent 4 }}
spec:
  podSelector:
    matchExpressions:
      - key: egress-permitted
        operator: NotIn
        values:
          - "true"
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector: {}
{{- end }}

